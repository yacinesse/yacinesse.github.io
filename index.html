<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <main class="container">
        <article class="glass-card" aria-label="Business card for Abdesselam Salmi">

            <div class="card-ring" aria-hidden="true"></div>

            <!-- Profile -->
            <div class="profile-section">

            <div class="info-section">

                </h1>
                <div class="title-row">

                    <span class="title-line"></span>

            <!-- Divider -->

            <!-- Social Links -->
            <nav class="social-links" aria-label="Contact and social links">

                <a href="https://www.behance.net/yacinessesalmi"
                   target="_blank" rel="noopener noreferrer"

                    <i class="fa-brands fa-behance" aria-hidden="true"></i>

                <a href="https://www.linkedin.com/in/abdesselam-salmi-070819242"
                   target="_blank" rel="noopener noreferrer"

                    <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
                    <span class="social-label">LinkedIn</span>
                </a>

                <a href="https://api.whatsapp.com/send/?phone=971503531737&text=Hi+I+found+your+business+card&type=phone_number&app_absent=0"
                   target="_blank" rel="noopener noreferrer"
                   aria-label="WhatsApp chat"
                   class="social-link" data-icon="whatsapp">
                    <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>

    <script>
        // ── Year ──────────────────────────────────────────────────
        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Canvas particle system ────────────────────────────────
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [], mouse = { x: -9999, y: -9999 };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(true); }
            reset(random = false) {
                this.x = Math.random() * W;
                this.y = random ? Math.random() * H : H + 10;
                this.r = Math.random() * 1.8 + 0.4;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = -(Math.random() * 0.5 + 0.2);
                this.life = 0;
                this.maxLife = Math.random() * 200 + 120;
                this.hue = Math.random() * 60 + 220;
            }
            update() {
                const dx = this.x - mouse.x, dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 80) {
                    this.vx += (dx / dist) * 0.15;
                    this.vy += (dy / dist) * 0.15;
                }
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life++;
                if (this.life > this.maxLife || this.y < -10) this.reset();
            }
            draw() {
                const alpha = Math.sin((this.life / this.maxLife) * Math.PI) * 0.55;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(${this.hue}, 80%, 70%)`;
                ctx.shadowColor = `hsl(${this.hue}, 90%, 60%)`;
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 90) {
                        ctx.save();
                        ctx.globalAlpha = (1 - d / 90) * 0.12;
                        ctx.strokeStyle = `hsl(250, 70%, 70%)`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function init() {
            resize();
            particles = Array.from({ length: 80 }, () => new Particle());
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            drawConnections();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });

        init();
        loop();

        // ── Staggered card entrance ───────────────────────────────
        document.querySelectorAll('.social-link').forEach((el, i) => {
            el.style.setProperty('--delay', `${i * 0.07 + 0.5}s`);
        });

        // ── Magnetic 3-D tilt + cursor spotlight ─────────────────
        const links = document.querySelectorAll('.social-link');
        const TILT   = 14;   // max tilt degrees
        const LIFT   = -8;   // px lift on hover
        const SCALE  = 1.10;

        links.forEach(el => {
            let raf = null;
            let isHovered = false;

            function applyTilt(e) {
                const r   = el.getBoundingClientRect();
                const cx  = r.left + r.width  / 2;
                const cy  = r.top  + r.height / 2;
                const dx  = (e.clientX - cx) / (r.width  / 2);  // -1 → 1
                const dy  = (e.clientY - cy) / (r.height / 2);  // -1 → 1

                // Cursor position as % for the ::before spotlight
                const mx  = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
                const my  = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';

                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => {
                    el.style.transform =
                        `perspective(600px)
                         translateY(${LIFT}px)
                         scale(${SCALE})
                         rotateY(${dx * TILT}deg)
                         rotateX(${-dy * TILT}deg)`;
                    el.style.setProperty('--mx', mx);
                    el.style.setProperty('--my', my);
                });
            }

            function resetTilt() {
                isHovered = false;
                cancelAnimationFrame(raf);
                // Spring-back via CSS transition
                el.style.transition =
                    'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease';
                el.style.transform = 'perspective(600px) translateY(0) scale(1) rotateY(0deg) rotateX(0deg)';
            }

            el.addEventListener('mouseenter', () => {
                isHovered = true;
                el.style.transition = 'border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease';
            });

            el.addEventListener('mousemove', applyTilt);

            el.addEventListener('mouseleave', resetTilt);

            // Click ripple burst
            el.addEventListener('click', function(e) {
                const r    = el.getBoundingClientRect();
                const size = Math.max(r.width, r.height) * 1.5;
                const x    = e.clientX - r.left - size / 2;
                const y    = e.clientY - r.top  - size / 2;

                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.cssText =
                    `width:${size}px; height:${size}px; left:${x}px; top:${y}px;`;
                el.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            });
        });
    </script>
</body>
